{% load static %}
<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <meta name="description" content="" />
    <meta name="author" content="" />

    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{% static 'login1.css' %}">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.gstatic.com">

    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Text:wght@700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/js/all.min.js"
            crossorigin="anonymous"></script>

</head>

<body>

    <!-- Messages -->
    <div class="messages" id="alert-message">

        {% for message in messages %}

        <div class="alert alert-{{ message.tags }} mb-0 alert-dismissible fade show"
             role="alert">

            <strong>Message :</strong> {{ message }}

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="Close">
            </button>

        </div>

        {% endfor %}

    </div>

    <!-- Body Content -->
    {% block body %}
    {% endblock body %}

    <!-- Footer -->
    <div id="layoutAuthentication_footer">

        <footer class="py-4 mt-auto text-center text-light">

            <div class="container-fluid">

                <small>
                    Expense Tracker Project
                </small>

            </div>

        </footer>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auto Hide Messages -->
    <script>

        $(function () {

            setTimeout(function () {

                $("#alert-message").hide();

            }, 2000);

        });

    </script>

</body>

</html>
