{% extends 'base.html' %}
{% block body %}

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 p-5"
         style="
         width: 500px;
         background: #1e293b;
         border-radius: 20px;
         ">

        <h1 class="text-center text-info mb-4 fw-bold">
            My Wallet
        </h1>

        <form method="post" action="/addmoney_submission/">

            {% csrf_token %}

            <div class="mb-4 text-light">

                <label class="form-label mb-3">
                    What do you want to add?
                </label>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="add_money"
                           value="Expense"
                           checked
                           required>

                    <label class="form-check-label">
                        Expense
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="add_money"
                           value="Income"
                           required>

                    <label class="form-check-label">
                        Income
                    </label>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label text-light">
                    Amount
                </label>

                <input type="number"
                       name="quantity"
                       min="1"
                       class="form-control p-3 rounded-pill"
                       placeholder="Enter amount"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label text-light">
                    Expense Date
                </label>

                <input type="date"
                       name="Date"
                       class="form-control p-3 rounded-pill"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label text-light">
                    Category
                </label>

                <select class="form-select p-3 rounded-pill"
                        name="Category"
                        required>

                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Necessities">Necessities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Others">Others</option>

                </select>
            </div>

            <button type="submit"
                    class="btn btn-info w-100 p-3 rounded-pill fw-bold text-white">

                Submit

            </button>

        </form>

    </div>

</div>

{% endblock body %}
