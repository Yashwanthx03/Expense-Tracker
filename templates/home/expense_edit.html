{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Expense Tracker - Edit</title>

    <link rel="stylesheet" type="text/css" href="{% static 'home.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'addmoney.css' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-primary">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-header text-center bg-dark text-white rounded-top-4">
                        <h2 class="py-2">Edit Transaction</h2>
                    </div>

                    <div class="card-body p-4">

                        <form method="post" action="{% url 'addmoney_update' addmoney_info.id %}">

                            {% csrf_token %}

                            <!-- Transaction Type -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Select Type
                                </label>

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           name="add_money"
                                           value="Expense"
                                           {% if addmoney_info.add_money == 'Expense' %}checked{% endif %}>

                                    <label class="form-check-label">
                                        Expense
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           name="add_money"
                                           value="Income"
                                           {% if addmoney_info.add_money == 'Income' %}checked{% endif %}>

                                    <label class="form-check-label">
                                        Income
                                    </label>
                                </div>

                            </div>

                            <!-- Amount -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">
                                    Amount
                                </label>

                                <input type="number"
                                       name="quantity"
                                       value="{{addmoney_info.quantity}}"
                                       class="form-control"
                                       required>

                            </div>

                            <!-- Date -->
                            <div class="mb-3">

                                <label class="form-label fw-bold">
                                    Expense Date
                                </label>

                                <input type="date"
                                       name="Date"
                                       value="{{addmoney_info.Date|date:'Y-m-d'}}"
                                       class="form-control">

                            </div>

                            <!-- Category -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Category
                                </label>

                                <select class="form-select"
                                        name="Category"
                                        required>

                                    <option value="Food">Food</option>
                                    <option value="Travel">Travel</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Necessities">Necessities</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Others">Others</option>

                                </select>

                            </div>

                            <!-- Button -->
                            <div class="d-grid">

                                <button type="submit" class="btn btn-success btn-lg">
                                    Update Transaction
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
