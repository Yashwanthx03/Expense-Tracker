{% extends 'base.html' %}

{% block body %}

<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111827;
">

    <div style="
    background:#1f2937;
    padding:40px;
    border-radius:20px;
    width:400px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    ">

        <h1 style="
        color:#38bdf8;
        text-align:center;
        margin-bottom:30px;
        ">
            Expense Tracker
        </h1>

        <form action="/handlelogin/" method="post">

            {% csrf_token %}

            <div style="margin-bottom:20px;">

                <label style="
                color:white;
                display:block;
                margin-bottom:8px;
                ">
                    Username
                </label>

                <input 
                    type="text"
                    name="loginuname"
                    placeholder="Enter username"
                    required

                    style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    "
                >
            </div>

            <div style="margin-bottom:20px;">

                <label style="
                color:white;
                display:block;
                margin-bottom:8px;
                ">
                    Password
                </label>

                <input 
                    type="password"
                    name="loginpassword1"
                    placeholder="Enter password"
                    required

                    style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    "
                >
            </div>

            <button 
                type="submit"

                style="
                width:100%;
                padding:12px;
                border:none;
                border-radius:10px;
                background:#38bdf8;
                color:white;
                font-size:16px;
                cursor:pointer;
                "
            >
                Login
            </button>

        </form>

        <div style="text-align:center; margin-top:20px;">
            <a href="/register" style="color:#38bdf8;">
                Need an account? Sign up!
            </a>
        </div>

        <div style="text-align:center; margin-top:10px;">
            <a href="/reset_password" style="color:#facc15;">
                Forgot Password?
            </a>
        </div>

    </div>

</div>

{% endblock body %}
