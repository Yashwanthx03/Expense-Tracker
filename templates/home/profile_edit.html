{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background: linear-gradient(to right, #312e81, #38bdf8);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .edit-container{
            margin-top: 60px;
            margin-bottom: 60px;
        }

        .edit-card{
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .profile-icon{
            font-size: 110px;
            color: #2563eb;
            margin-bottom: 20px;
        }

        .left-section{
            text-align: center;
            padding-top: 20px;
        }

        .left-section h3{
            font-weight: bold;
            margin-top: 10px;
        }

        .left-section p{
            color: gray;
            font-size: 18px;
        }

        .form-label{
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-control{
            border-radius: 50px;
            padding: 14px;
        }

        .save-btn{
            border-radius: 50px;
            padding: 14px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
        }

    </style>

</head>

<body>

<div class="container edit-container">

    <div class="edit-card">

        <form method="POST"
              enctype="multipart/form-data"
              action="{% url 'profile_update' add.id %}">

            {% csrf_token %}

            <div class="row">

                <!-- LEFT SECTION -->

                <div class="col-md-4 left-section">

                    <i class="fas fa-user-circle profile-icon"></i>

                    <h3>
                        {{ user }}
                    </h3>

                    <p>
                        {{ user.userprofile.profession }}
                    </p>

                </div>

                <!-- RIGHT SECTION -->

                <div class="col-md-8">

                    <h2 class="fw-bold mb-4">
                        Edit Profile
                    </h2>

                    <div class="mb-3">

                        <label class="form-label">
                            First Name
                        </label>

                        <input type="text"
                               name="fname"
                               class="form-control"
                               value="{{ user.first_name }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Last Name
                        </label>

                        <input type="text"
                               name="lname"
                               class="form-control"
                               value="{{ user.last_name }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ user.email }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Savings
                        </label>

                        <input type="text"
                               name="Savings"
                               class="form-control"
                               value="{{ user.userprofile.Savings }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Income
                        </label>

                        <input type="text"
                               name="income"
                               class="form-control"
                               value="{{ user.userprofile.income }}">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Profession
                        </label>

                        <input type="text"
                               name="profession"
                               class="form-control"
                               value="{{ user.userprofile.profession }}">

                    </div>

                    <button type="submit"
                            class="btn btn-primary save-btn">

                        Save Changes

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
