{% extends 'base.html' %}

{% block body %}

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 90vh;">

    <div class="card p-5 shadow-lg border-0"
         style="
         width: 450px;
         background: #1e293b;
         border-radius: 20px;
         ">

        <h1 class="text-center mb-4"
            style="
            color: #38bdf8;
            font-family: 'Big Shoulders Stencil Text', cursive;
            font-size: 55px;
            ">
            Reset Password
        </h1>

        <p class="text-light text-center mb-4">
            Enter your email address and we will send a password reset link.
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label text-light">
                    Email Address
                </label>

                {{ form.email }}

            </div>

            <button type="submit"
                    class="btn btn-info w-100 py-2 fw-bold">
                Send Reset Link
            </button>

        </form>

        <div class="text-center mt-4">

            <a href="/"
               style="
               color: #38bdf8;
               text-decoration: none;
               font-weight: bold;
               ">
               Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock body %}
